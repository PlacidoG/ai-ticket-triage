services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ticket-triage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_ticket_triage
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ai_ticket_triage"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
